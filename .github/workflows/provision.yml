name: Provision ADE Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      ENV_NAME: env-pr-${{ github.event.pull_request.number }}
      PROJECT: my-ade-project
      ENV_TYPE: Dev
      CATALOG_NAME: my-catalog
      ADMIN_USERNAME: azureuser
      BRANCH_NAME: ${{ github.head_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install devcenter CLI extension
        run: az extension add --name devcenter --output none

      - name: Delete existing environment if present
        run: |
          ENV_EXISTS=$(az devcenter dev environment show \
            --endpoint "${{ secrets.DEVCENTER_URI }}" \
            --project-name $PROJECT \
            --name $ENV_NAME \
            2>/dev/null) || true
          if [ -n "$ENV_EXISTS" ]; then
            echo "Environment $ENV_NAME already exists — deleting..."
            az devcenter dev environment delete \
              --endpoint "${{ secrets.DEVCENTER_URI }}" \
              --project-name $PROJECT \
              --name $ENV_NAME \
              --yes
            echo "Waiting for deletion..."
            while az devcenter dev environment show \
                --endpoint "${{ secrets.DEVCENTER_URI }}" \
                --project-name $PROJECT \
                --name $ENV_NAME \
                2>/dev/null; do
              sleep 10
            done
            echo "Deleted."
          fi

      - name: Create ADE Environment
        run: |
          echo "Provisioning environment: $ENV_NAME for branch: $BRANCH_NAME"
          az devcenter dev environment create \
            --endpoint "${{ secrets.DEVCENTER_URI }}" \
            --project-name $PROJECT \
            --name $ENV_NAME \
            --environment-type $ENV_TYPE \
            --catalog-name $CATALOG_NAME \
            --environment-definition-name "LinuxVM" \
            --parameters "{\"adminUsername\": \"$ADMIN_USERNAME\", \"branchName\": \"$BRANCH_NAME\"}"
          echo "Environment provisioned successfully"

      - name: Get VM Details
        id: vm
        run: |
          ENV_RG=$(az devcenter dev environment show \
            --endpoint "${{ secrets.DEVCENTER_URI }}" \
            --project-name $PROJECT \
            --name $ENV_NAME \
            --user-id me \
            --query "resourceGroupId" -o tsv | sed 's|.*/||')

          DEPLOYMENT_NAME=$(az deployment group list \
            --resource-group $ENV_RG \
            --query "[0].name" -o tsv)

          SSH_COMMAND=$(az deployment group show \
            --resource-group $ENV_RG \
            --name $DEPLOYMENT_NAME \
            --query "properties.outputs.sshCommand.value" -o tsv)

          VM_IP=$(az deployment group show \
            --resource-group $ENV_RG \
            --name $DEPLOYMENT_NAME \
            --query "properties.outputs.vmIp.value" -o tsv)

          VM_PASSWORD=$(az deployment group show \
            --resource-group $ENV_RG \
            --name $DEPLOYMENT_NAME \
            --query "properties.outputs.adminPassword.value" -o tsv)

          BRANCH=$(az deployment group show \
            --resource-group $ENV_RG \
            --name $DEPLOYMENT_NAME \
            --query "properties.outputs.branchDeployed.value" -o tsv)

          echo "ssh_command=$SSH_COMMAND" >> $GITHUB_OUTPUT
          echo "vm_ip=$VM_IP" >> $GITHUB_OUTPUT
          echo "vm_password=$VM_PASSWORD" >> $GITHUB_OUTPUT
          echo "env_rg=$ENV_RG" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run Hello World from Branch Code
        id: hello
        run: |
          echo "Waiting 90s for VM to boot and cloud-init to complete..."
          sleep 90
          HELLO=$(sshpass -p "${{ steps.vm.outputs.vm_password }}" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            $ADMIN_USERNAME@${{ steps.vm.outputs.vm_ip }} \
            'cat /tmp/hello_output.txt' 2>/dev/null) || HELLO="(SSH not ready — connect manually)"
          echo "hello_output<<EOF" >> $GITHUB_OUTPUT
          echo "$HELLO" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ ADE Dev Environment Ready

            | Field | Value |
            |-------|-------|
            | **Environment** | \`${{ env.ENV_NAME }}\` |
            | **Branch Deployed** | \`${{ steps.vm.outputs.branch }}\` |
            | **Resource Group** | \`${{ steps.vm.outputs.env_rg }}\` |
            | **VM IP** | \`${{ steps.vm.outputs.vm_ip }}\` |
            | **Username** | \`${{ env.ADMIN_USERNAME }}\` |
            | **Password** | \`${{ steps.vm.outputs.vm_password }}\` |

            **SSH Command:**
            \`\`\`
            ${{ steps.vm.outputs.ssh_command }}
            \`\`\`

            **Output from branch \`${{ steps.vm.outputs.branch }}\` running on VM:**
            \`\`\`
            ${{ steps.hello.outputs.hello_output }}
            \`\`\`

            > 🗑️ Environment will be automatically deleted when this PR is closed.`
            })
